<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>All Age Care</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Start Header -->
    <header>
      <div class="container">
        <div class="logo">
          <span class="heart">❤️</span> <span>All Age Care</span>
        </div>

        <nav>
          <ul>
            <li><a href="../Home/index.html">Home</a></li>
            <li><a href="../About Us/index.html">About Us</a></li>
            <li><a href="../Contact Us/contactus.html">Contact Us</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- End Header -->

    <!-- Start Main -->
    <section class="main">
      <div class="container">
        <div class="image">
          <img src="assets/gedo.jpeg" alt="Contact US" />
        </div>

        <!-- Form -->
        <div class="form">
          <h2>CONTACT US</h2>

          <form>
            <div class="input">
              <label>Name</label>
              <input type="text" placeholder="Enter your full name" required />
            </div>

            <div class="input">
              <label>Email</label>
              <input type="email" placeholder="Enter your email address" required />
            </div>

            <div class="input">
              <label>Subject</label>
              <input type="text" placeholder="How can we help you?"  required
              />
            </div>

        
            
            <button class="send">SEND MESSAGE</button>
          </form>
        </div>
      </div>
    </section>
    <!-- End Main -->
  </body>
</html>
